apiVersion: v1
kind: ConfigMap
metadata:
  name: sona-ai-os-config
  namespace: sona-ai-os
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "WARNING"
  LOG_FORMAT: "json"
  HOST: "0.0.0.0"
  PORT: "8000"
  DATABASE_URL: "sqlite:///data/sona.db"
  CORS_ORIGINS: "https://sona-ai.io"
  RATE_LIMIT: "200"
  WORKERS: "4"
