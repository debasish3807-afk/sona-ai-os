apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sona-ai-os
  namespace: sona-ai-os
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.sona-ai.io
      secretName: sona-ai-os-tls
  rules:
    - host: api.sona-ai.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sona-ai-os
                port:
                  number: 8000
