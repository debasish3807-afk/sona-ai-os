# =============================================================================
# Sona AI OS — Development Deployment Pipeline
# =============================================================================
# Triggers: Push to main or develop branch (after CI passes)
# Policy:   Deploy ONLY if all CI checks pass. Never deploy broken code.
# Target:   Development/staging environment
# =============================================================================

name: Deploy Development

on:
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  WORKING_DIR: backend
  DEPLOY_ENV: development
  APP_NAME: sona-ai-os
  IMAGE_TAG: dev-${{ github.sha }}

# Ensure only one deployment runs at a time per branch
concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Gate: Run CI Checks First — Never deploy if tests fail
  # ===========================================================================
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Lint check
        run: ruff check . --output-format=github
        working-directory: ${{ env.WORKING_DIR }}

      - name: Format check
        run: ruff format --check .
        working-directory: ${{ env.WORKING_DIR }}

      - name: Type check
        run: mypy . --ignore-missing-imports
        working-directory: ${{ env.WORKING_DIR }}

      - name: Security scan
        run: bandit -r . -x ./tests -ll -ii
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -v
        working-directory: ${{ env.WORKING_DIR }}

      - name: Validate syntax
        run: |
          python -c "
          import py_compile, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              if '.git' in root or '__pycache__' in root:
                  continue
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          errors.append(str(e))
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('✅ All Python files pass syntax validation')
          "
        working-directory: ${{ env.WORKING_DIR }}

  # ===========================================================================
  # Build: Create deployment artifact
  # ===========================================================================
  build:
    name: "Build Artifact"
    runs-on: ubuntu-latest
    needs: ci-gate
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
      build_time: ${{ steps.meta.outputs.build_time }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate build metadata
        id: meta
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create deployment package
        run: |
          mkdir -p dist
          cp -r ${{ env.WORKING_DIR }}/ dist/backend/
          rm -rf dist/backend/__pycache__ dist/backend/tests
          find dist/ -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "{
            \"app\": \"${{ env.APP_NAME }}\",
            \"version\": \"dev\",
            \"commit\": \"${{ github.sha }}\",
            \"branch\": \"${{ github.ref_name }}\",
            \"build_time\": \"${{ steps.meta.outputs.build_time }}\",
            \"environment\": \"${{ env.DEPLOY_ENV }}\"
          }" > dist/build-info.json
          cat dist/build-info.json

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package-dev
          path: dist/
          retention-days: 7

      # NOTE: When Docker registry is configured, add:
      # - name: Build Docker image
      #   run: docker build -t ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} .
      # - name: Push to registry
      #   run: docker push $REGISTRY/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

  # ===========================================================================
  # Deploy: Push to development environment
  # ===========================================================================
  deploy:
    name: "Deploy to Development"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: development
      url: https://dev.sona-ai.example.com
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package-dev
          path: dist/

      - name: Display deployment info
        run: |
          echo "============================================"
          echo "  DEPLOYMENT: Development Environment"
          echo "============================================"
          echo "  App:         ${{ env.APP_NAME }}"
          echo "  Environment: ${{ env.DEPLOY_ENV }}"
          echo "  Branch:      ${{ github.ref_name }}"
          echo "  Commit:      ${{ github.sha }}"
          echo "  Image Tag:   ${{ env.IMAGE_TAG }}"
          echo "  Triggered:   ${{ github.event_name }}"
          echo "  Actor:       ${{ github.actor }}"
          echo "============================================"
          cat dist/build-info.json

      # NOTE: Replace with actual deployment commands:
      # - name: Deploy to Kubernetes
      #   run: |
      #     kubectl set image deployment/${{ env.APP_NAME }} \
      #       app=$REGISTRY/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} \
      #       --namespace=development
      #
      # - name: Deploy to AWS ECS
      #   run: |
      #     aws ecs update-service \
      #       --cluster sona-dev \
      #       --service ${{ env.APP_NAME }} \
      #       --force-new-deployment

      - name: Deployment placeholder
        run: |
          echo "✅ Development deployment successful (placeholder)"
          echo "   Configure actual deployment target in this step"

  # ===========================================================================
  # Verify: Post-deployment health check
  # ===========================================================================
  verify:
    name: "Verify Deployment"
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        run: |
          echo "Running post-deployment health checks..."
          # NOTE: Replace with actual health endpoint:
          # curl -f https://dev.sona-ai.example.com/api/v1/health || exit 1
          echo "✅ Health check passed (placeholder)"

      - name: Deployment summary
        run: |
          echo "## 🚀 Development Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Development |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
