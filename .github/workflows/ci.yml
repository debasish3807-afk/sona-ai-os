# =============================================================================
# Sona AI OS — Continuous Integration Pipeline
# =============================================================================
# Triggers: Pull requests to main/develop, pushes to main/develop
# Gates:    Lint → Type Check → Security → Test → Validate Architecture
# Policy:   All gates must pass before merge is allowed
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  WORKING_DIR: backend

jobs:
  # ===========================================================================
  # Stage 1: Code Quality — Lint & Format Check
  # ===========================================================================
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run Ruff linter
        run: ruff check . --output-format=github
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run Ruff formatter check
        run: ruff format --check .
        working-directory: ${{ env.WORKING_DIR }}

  # ===========================================================================
  # Stage 2: Type Safety — Static Type Analysis
  # ===========================================================================
  type-check:
    name: "Type Check"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run Mypy type checker
        run: mypy . --ignore-missing-imports
        working-directory: ${{ env.WORKING_DIR }}

  # ===========================================================================
  # Stage 3: Security — Vulnerability Scanning
  # ===========================================================================
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run Bandit security scanner
        run: bandit -r . -x ./tests -f json -o bandit-report.json || true
        working-directory: ${{ env.WORKING_DIR }}

      - name: Check Bandit results (fail on high severity)
        run: bandit -r . -x ./tests -ll -ii
        working-directory: ${{ env.WORKING_DIR }}

  # ===========================================================================
  # Stage 4: Tests — Unit & Integration Testing
  # ===========================================================================
  test:
    name: "Test Suite"
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run test suite with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.WORKING_DIR }}/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ env.WORKING_DIR }}/test-results.xml

  # ===========================================================================
  # Stage 5: Architecture Validation — Import & Structure Checks
  # ===========================================================================
  validate:
    name: "Architecture Validation"
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Validate Python syntax (all files)
        run: |
          python -c "
          import py_compile, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              if '.git' in root or '__pycache__' in root:
                  continue
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          errors.append(str(e))
          if errors:
              print(f'SYNTAX ERRORS ({len(errors)}):')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          else:
              print(f'All Python files pass syntax validation.')
          "
        working-directory: ${{ env.WORKING_DIR }}

      - name: Validate no circular imports
        run: |
          python -c "
          import ast, os, sys
          from collections import defaultdict

          # Build import graph
          graph = defaultdict(set)
          modules = set()

          for root, dirs, files in os.walk('.'):
              if '.git' in root or '__pycache__' in root or 'tests' in root:
                  continue
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      module = path.replace('./', '').replace('/', '.').replace('.py', '')
                      if module.endswith('.__init__'):
                          module = module[:-9]
                      modules.add(module)
                      try:
                          with open(path) as fh:
                              tree = ast.parse(fh.read())
                          for node in ast.walk(tree):
                              if isinstance(node, ast.Import):
                                  for alias in node.names:
                                      graph[module].add(alias.name.split('.')[0])
                              elif isinstance(node, ast.ImportFrom):
                                  if node.module:
                                      graph[module].add(node.module.split('.')[0])
                      except:
                          pass

          # Check for direct circular dependencies between top-level packages
          top_packages = {'app', 'api', 'config', 'core', 'kernel', 'providers', 'agents', 'memory'}
          pkg_graph = defaultdict(set)
          for mod, imports in graph.items():
              src_pkg = mod.split('.')[0]
              if src_pkg in top_packages:
                  for imp in imports:
                      if imp in top_packages and imp != src_pkg:
                          pkg_graph[src_pkg].add(imp)

          # Simple cycle detection
          def has_cycle(node, visited, rec_stack):
              visited.add(node)
              rec_stack.add(node)
              for neighbor in pkg_graph.get(node, set()):
                  if neighbor not in visited:
                      if has_cycle(neighbor, visited, rec_stack):
                          return True
                  elif neighbor in rec_stack:
                      print(f'WARNING: Potential circular dependency: {node} <-> {neighbor}')
              rec_stack.discard(node)
              return False

          visited = set()
          for pkg in top_packages:
              if pkg not in visited:
                  has_cycle(pkg, visited, set())

          print('Architecture dependency validation complete.')
          "
        working-directory: ${{ env.WORKING_DIR }}

      - name: Validate package structure
        run: |
          python -c "
          import os, sys

          required_packages = ['app', 'api', 'config', 'core', 'kernel', 'providers', 'agents', 'memory']
          missing = []
          for pkg in required_packages:
              init_path = os.path.join(pkg, '__init__.py')
              if not os.path.exists(init_path):
                  missing.append(pkg)

          if missing:
              print(f'ERROR: Missing __init__.py in: {missing}')
              sys.exit(1)
          else:
              print(f'All {len(required_packages)} packages have valid __init__.py')
          "
        working-directory: ${{ env.WORKING_DIR }}

  # ===========================================================================
  # Final Gate: All Checks Must Pass
  # ===========================================================================
  ci-complete:
    name: "CI Complete"
    runs-on: ubuntu-latest
    needs: [lint, type-check, security, test, validate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.validate.result }}" != "success" ]; then
            echo "❌ CI Pipeline FAILED"
            echo "  Lint: ${{ needs.lint.result }}"
            echo "  Type Check: ${{ needs.type-check.result }}"
            echo "  Security: ${{ needs.security.result }}"
            echo "  Test: ${{ needs.test.result }}"
            echo "  Validate: ${{ needs.validate.result }}"
            exit 1
          fi
          echo "✅ All CI checks passed"
