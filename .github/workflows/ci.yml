# Sona AI OS — Continuous Integration
# =====================================
# Runs on push to main and pull requests.
# Activate steps as implementation progresses.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Uncomment when backend implementation begins:
