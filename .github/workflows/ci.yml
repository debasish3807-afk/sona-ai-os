      # - name: Run Mypy
      #   run: mypy backend/ --ignore-missing-imports

      - name: Validate Markdown
        run: echo "Markdown validation placeholder"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Uncomment when backend implementation begins:
