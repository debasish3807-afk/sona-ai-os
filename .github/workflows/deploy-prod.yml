# =============================================================================
# Sona AI OS — Production Deployment Pipeline
# =============================================================================
# Triggers: ONLY on tagged releases matching v*.*.* pattern (e.g., v1.0.0)
# Policy:   Full CI must pass. Manual approval required before production deploy.
#           Deployment NEVER happens if tests or validations fail.
# Target:   Production environment
# =============================================================================

name: Deploy Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v1.0.0, v1.1.0, v2.0.0
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+" # v1.0.0-rc1 (release candidates)

env:
  PYTHON_VERSION: "3.12"
  WORKING_DIR: backend
  DEPLOY_ENV: production
  APP_NAME: sona-ai-os

# Only one production deployment at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Stage 1: Extract Release Metadata
  # ===========================================================================
  metadata:
    name: "Release Metadata"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-rc"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "📦 Release version: $VERSION"
          echo "🏷️ Tag: $TAG"

  # ===========================================================================
  # Stage 2: Full CI Validation — ALL checks must pass
  # ===========================================================================
  ci-gate:
    name: "CI Gate (Full Validation)"
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Lint check
        run: ruff check . --output-format=github
        working-directory: ${{ env.WORKING_DIR }}

      - name: Format check
        run: ruff format --check .
        working-directory: ${{ env.WORKING_DIR }}

      - name: Type check
        run: mypy . --ignore-missing-imports
        working-directory: ${{ env.WORKING_DIR }}

      - name: Security scan (strict — fail on medium+)
        run: bandit -r . -x ./tests -ll
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run full test suite
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            --junitxml=test-results.xml \
            -v --strict-markers
        working-directory: ${{ env.WORKING_DIR }}

      - name: Validate Python syntax
        run: |
          python -c "
          import py_compile, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              if '.git' in root or '__pycache__' in root:
                  continue
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          errors.append(str(e))
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('✅ All Python files pass syntax validation')
          "
        working-directory: ${{ env.WORKING_DIR }}

      - name: Validate package structure
        run: |
          python -c "
          import os, sys
          required = ['app', 'api', 'config', 'core', 'kernel', 'providers', 'agents', 'memory']
          missing = [p for p in required if not os.path.exists(os.path.join(p, '__init__.py'))]
          if missing:
              print(f'ERROR: Missing __init__.py in: {missing}')
              sys.exit(1)
          print(f'✅ All {len(required)} packages validated')
          "
        working-directory: ${{ env.WORKING_DIR }}

  # ===========================================================================
  # Stage 3: Build Production Artifact
  # ===========================================================================
  build:
    name: "Build Production Package"
    runs-on: ubuntu-latest
    needs: [metadata, ci-gate]
    outputs:
      image_tag: ${{ needs.metadata.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create production package
        run: |
          mkdir -p dist
          cp -r ${{ env.WORKING_DIR }}/ dist/backend/
          rm -rf dist/backend/__pycache__ dist/backend/tests dist/backend/requirements-dev.txt
          find dist/ -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist/ -name "*.pyc" -delete 2>/dev/null || true
          echo "{
            \"app\": \"${{ env.APP_NAME }}\",
            \"version\": \"${{ needs.metadata.outputs.version }}\",
            \"commit\": \"${{ github.sha }}\",
            \"tag\": \"${{ github.ref_name }}\",
            \"build_time\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\",
            \"environment\": \"${{ env.DEPLOY_ENV }}\",
            \"is_prerelease\": ${{ needs.metadata.outputs.is_prerelease }}
          }" > dist/build-info.json
          cat dist/build-info.json

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package-prod-${{ needs.metadata.outputs.version }}
          path: dist/
          retention-days: 90

      # NOTE: When Docker registry is configured:
      # - name: Build production Docker image
      #   run: |
      #     docker build \
      #       --build-arg VERSION=${{ needs.metadata.outputs.version }} \
      #       --tag $REGISTRY/${{ env.APP_NAME }}:${{ needs.metadata.outputs.version }} \
      #       --tag $REGISTRY/${{ env.APP_NAME }}:latest \
      #       .
      # - name: Push to production registry
      #   run: |
      #     docker push $REGISTRY/${{ env.APP_NAME }}:${{ needs.metadata.outputs.version }}
      #     docker push $REGISTRY/${{ env.APP_NAME }}:latest

  # ===========================================================================
  # Stage 4: Deploy to Production (requires environment approval)
  # ===========================================================================
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [metadata, build]
    environment:
      name: production
      url: https://sona-ai.example.com
    steps:
      - name: Download production artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package-prod-${{ needs.metadata.outputs.version }}
          path: dist/

      - name: Display deployment info
        run: |
          echo "============================================"
          echo "  🚀 PRODUCTION DEPLOYMENT"
          echo "============================================"
          echo "  App:         ${{ env.APP_NAME }}"
          echo "  Version:     ${{ needs.metadata.outputs.version }}"
          echo "  Tag:         ${{ github.ref_name }}"
          echo "  Commit:      ${{ github.sha }}"
          echo "  Environment: ${{ env.DEPLOY_ENV }}"
          echo "  Prerelease:  ${{ needs.metadata.outputs.is_prerelease }}"
          echo "  Actor:       ${{ github.actor }}"
          echo "============================================"
          cat dist/build-info.json

      # NOTE: Replace with actual production deployment:
      # - name: Deploy to Kubernetes (production)
      #   run: |
      #     kubectl set image deployment/${{ env.APP_NAME }} \
      #       app=$REGISTRY/${{ env.APP_NAME }}:${{ needs.metadata.outputs.version }} \
      #       --namespace=production
      #     kubectl rollout status deployment/${{ env.APP_NAME }} \
      #       --namespace=production --timeout=300s
      #
      # - name: Deploy to AWS ECS (production)
      #   run: |
      #     aws ecs update-service \
      #       --cluster sona-prod \
      #       --service ${{ env.APP_NAME }} \
      #       --force-new-deployment
      #     aws ecs wait services-stable \
      #       --cluster sona-prod \
      #       --services ${{ env.APP_NAME }}

      - name: Production deployment placeholder
        run: |
          echo "✅ Production deployment successful (placeholder)"
          echo "   Configure actual deployment target in this step"

  # ===========================================================================
  # Stage 5: Post-Deployment Verification
  # ===========================================================================
  verify:
    name: "Production Verification"
    runs-on: ubuntu-latest
    needs: [metadata, deploy]
    steps:
      - name: Health check
        run: |
          echo "Running production health checks..."
          # NOTE: Replace with actual production health endpoint:
          # for i in 1 2 3 4 5; do
          #   if curl -sf https://sona-ai.example.com/api/v1/health; then
          #     echo "✅ Health check passed (attempt $i)"
          #     exit 0
          #   fi
          #   echo "⏳ Retrying in 10s..."
          #   sleep 10
          # done
          # echo "❌ Health check failed after 5 attempts"
          # exit 1
          echo "✅ Production health check passed (placeholder)"

      - name: Smoke tests
        run: |
          echo "Running production smoke tests..."
          # NOTE: Add smoke tests against production:
          # curl -sf https://sona-ai.example.com/api/v1/version | jq .
          echo "✅ Smoke tests passed (placeholder)"

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.metadata.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Deployed & Verified |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Lint & Format" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Type Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Full Test Suite" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Architecture Validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Production Health Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Smoke Tests" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 6: Create GitHub Release
  # ===========================================================================
  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [metadata, verify]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          echo "## What's Changed" > release-notes.md
          echo "" >> release-notes.md
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" >> release-notes.md
          else
            git log --pretty=format:"- %s (%h)" -20 >> release-notes.md
          fi
          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Deployment Info" >> release-notes.md
          echo "- **Version:** ${{ needs.metadata.outputs.version }}" >> release-notes.md
          echo "- **Commit:** ${{ github.sha }}" >> release-notes.md
          echo "- **Environment:** Production" >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ needs.metadata.outputs.version }}"
          body_path: release-notes.md
          prerelease: ${{ needs.metadata.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
